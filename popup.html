<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DNS Quick Toggle</title>
<style>
  :root{--bg:#1c1b19;--surface:#242321;--surface2:#2d2c2a;--border:#393836;--text:#cdccca;--text-muted:#797876;--text-faint:#5a5957;--primary:#4f98a3;--primary-hover:#227f8b;--success:#6daa45;--error:#d163a7;--warning:#bb653b;--radius-sm:0.375rem;--radius-md:0.5rem;--radius-full:9999px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:340px;font-family:'Inter',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--text);padding:16px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .logo-wrap{display:flex;align-items:center;gap:8px}
  .logo{width:28px;height:28px;background:var(--primary);border-radius:0.5rem;display:flex;align-items:center;justify-content:center}
  h1{font-size:14px;font-weight:600}.subtitle{font-size:11px;color:var(--text-muted)}
  .active-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--radius-full);background:rgba(109,170,69,0.15);color:var(--success);border:1px solid rgba(109,170,69,0.3);white-space:nowrap}
  .active-badge.none{background:rgba(187,101,59,0.15);color:var(--warning);border-color:rgba(187,101,59,0.3)}
  .ff-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:var(--radius-full);background:rgba(79,152,163,0.15);color:var(--primary);border:1px solid rgba(79,152,163,0.3);margin-left:6px}
  .section-label{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;margin-top:12px}
  .dns-list{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto}
  .dns-list::-webkit-scrollbar{width:4px}.dns-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .dns-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 10px;cursor:pointer;transition:background 150ms,border-color 150ms}
  .dns-item:hover{background:var(--surface2);border-color:var(--primary)}
  .dns-item.active{border-color:var(--success);background:rgba(109,170,69,0.07)}
  .dns-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
  .dns-item.active .dns-dot{background:var(--success);box-shadow:0 0 6px rgba(109,170,69,0.5)}
  .dns-info{flex:1;min-width:0}
  .dns-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
  .dns-url{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tag{font-size:9px;padding:1px 5px;border-radius:var(--radius-full);background:var(--surface2);color:var(--text-faint);border:1px solid var(--border)}
  .dns-actions{display:flex;gap:4px}
  .btn-icon{width:22px;height:22px;background:none;border:none;color:var(--text-faint);cursor:pointer;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:color 150ms,background 150ms}
  .btn-icon:hover{color:var(--text);background:var(--surface2)}.btn-icon.delete:hover{color:var(--error);background:rgba(209,99,167,0.12)}
  .divider{border:none;border-top:1px solid var(--border);margin:12px 0}
  .add-form{display:flex;flex-direction:column;gap:6px}
  input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);padding:6px 10px;font-size:12px;outline:none;transition:border-color 150ms}
  input[type="text"]:focus{border-color:var(--primary)}
  input[type="text"]::placeholder{color:var(--text-faint)}
  .row{display:flex;gap:6px}
  .btn{flex:1;padding:7px 12px;border-radius:var(--radius-md);font-size:12px;font-weight:500;cursor:pointer;border:none;transition:background 150ms}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
  .btn-ghost{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface);color:var(--text)}
  .notice{font-size:10px;color:var(--text-faint);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;line-height:1.5;margin-top:10px}
  .notice a{color:var(--primary);text-decoration:none}.notice.success{border-color:rgba(109,170,69,0.3);background:rgba(109,170,69,0.07);color:var(--success)}
  .error-msg{font-size:11px;color:var(--error);display:none}.error-msg.visible{display:block}
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5">
        <circle cx="8" cy="8" r="6"/><path d="M8 2c0 0-3 2-3 6s3 6 3 6M8 2c0 0 3 2 3 6s-3 6-3 6M2 8h12"/>
      </svg>
    </div>
    <div><h1>DNS Quick Toggle <span class="ff-badge">Firefox</span></h1><div class="subtitle">Switch DoH provider instantly</div></div>
  </div>
  <div class="active-badge none" id="active-badge">None</div>
</header>
<div class="section-label">Providers</div>
<div class="dns-list" id="dns-list"></div>
<hr class="divider">
<div class="section-label">Add Custom Provider</div>
<div class="add-form">
  <input type="text" id="add-name" placeholder="Name (e.g. My NextDNS)">
  <input type="text" id="add-url" placeholder="DoH URL (https://...)">
  <div class="error-msg" id="error-msg">Valid DoH URL required (https://)</div>
  <div class="row">
    <button class="btn btn-ghost" id="disable-btn">⊘ Disable DoH</button>
    <button class="btn btn-primary" id="add-btn">Add</button>
  </div>
</div>
<div class="notice" id="status-notice">ℹ️ Click a provider to apply it. Opens <a href="#" id="open-settings">about:preferences#privacy →</a> if needed.</div>
<script src="popup.js"></script>
</body>
</html>
